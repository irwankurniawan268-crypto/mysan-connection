<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mysan Connection</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #eef2f7;
}
header {
    background: linear-gradient(90deg, #004aad, #00c6ff);
    color: white;
    text-align: center;
    padding: 60px 20px;
}
header h1 {
    margin: 0;
    font-size: 36px;
}
nav {
    background: #111;
    padding: 12px;
    text-align: center;
}
nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}
section {
    padding: 40px 20px;
}
.container {
    max-width: 1000px;
    margin: auto;
}
.card {
    background: white;
    padding: 25px;
    margin: 15px 0;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.paket {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}
.paket .card {
    flex: 1;
    min-width: 250px;
    text-align: center;
}
button {
    background: #25d366;
    color: white;
    border: none;
    padding: 12px 18px;
    border-radius: 6px;
    cursor: pointer;
}
input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
}
footer {
    background: #000;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Mysan Connection</h1>
    <p>Internet Super Cepat & Stabil untuk Rumah & Usaha</p>
</header>

<nav>
    <a href="#paket">Paket</a>
    <a href="#daftar">Daftar</a>
    <a href="#kontak">Kontak</a>
</nav>

<section id="paket">
<div class="container">
<h2>Paket Internet</h2>

<div class="paket">

<div class="card">
<h3>50 Mbps</h3>
<h2>Rp115.000</h2>
<button onclick="pesan('50 Mbps')">Pesan</button>
</div>

<div class="card">
<h3>100 Mbps</h3>
<h2>Rp165.000</h2>
<button onclick="pesan('100 Mbps')">Pesan</button>
</div>

<div class="card">
<h3>200 Mbps</h3>
<h2>Rp265.000</h2>
<button onclick="pesan('200 Mbps')">Pesan</button>
</div>

</div>
</div>
</section>

<section id="daftar">
<div class="container">
<div class="card">
<h2>Form Pendaftaran WiFi</h2>

<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="text" id="alamat" placeholder="Alamat Lengkap">
<input type="text" id="hp" placeholder="No WhatsApp">
<select id="paket">
<option value="">Pilih Paket</option>
<option>50 Mbps</option>
<option>100 Mbps</option>
<option>200 Mbps</option>
</select>

<button onclick="daftar()">Daftar Sekarang</button>

</div>
</div>
</section>

<section id="kontak">
<div class="container">
<div class="card">
<h2>Kontak</h2>
<p>WhatsApp: 089531706088</p>
<p>Melayani pemasangan cepat & profesional</p>
</div>
</div>
</section>

<footer>
<p>© 2026 Mysan Connection</p>
</footer>

<script>
function pesan(paket) {
    let nomor = "6289531706088";
    let text = "Halo Mysan Connection, saya mau pesan paket " + paket;
    window.location.href = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(text);
}

function daftar() {
    let nama = document.getElementById("nama").value;
    let alamat = document.getElementById("alamat").value;
    let hp = document.getElementById("hp").value;
    let paket = document.getElementById("paket").value;

    let nomor = "6289531706088";
    let text = "PENDAFTARAN WIFI%0A"
        + "Nama: " + nama + "%0A"
        + "Alamat: " + alamat + "%0A"
        + "No HP: " + hp + "%0A"
        + "Paket: " + paket;

    window.location.href = "https://wa.me/" + nomor + "?text=" + text;
}
</script>

</body>
</html>
